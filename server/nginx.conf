worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stderr;

    client_max_body_size 100m;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    upstream comfyui {
        server 127.0.0.1:8188;
    }

    server {
        listen 8000;
        server_name _;

        # -- WebSocket: /ws --
        location /ws {
            proxy_pass http://comfyui;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # -- Move endpoint: /api/userdata/{file}/move/{dest} --
        # Must come BEFORE regular userdata rules.
        # Nginx evaluates regex locations in declaration order; first match wins.

        # move: 2-seg file + 2-seg dest
        location ~ ^/api/userdata/([^/]+)/([^/]+)/move/([^/]+)/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1%2F$2/move/$3%2F$4$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # move: 2-seg file + 1-seg dest
        location ~ ^/api/userdata/([^/]+)/([^/]+)/move/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1%2F$2/move/$3$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # move: 1-seg file + 2-seg dest
        location ~ ^/api/userdata/([^/]+)/move/([^/]+)/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1/move/$2%2F$3$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # move: 1-seg file + 1-seg dest (prevents 3-seg regular rule from matching)
        location ~ ^/api/userdata/([^/]+)/move/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1/move/$2$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -- Regular userdata: /api/userdata/{file} --
        # Ordered most-specific first.

        # 4 segments
        location ~ ^/api/userdata/([^/]+)/([^/]+)/([^/]+)/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1%2F$2%2F$3%2F$4$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3 segments
        location ~ ^/api/userdata/([^/]+)/([^/]+)/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1%2F$2%2F$3$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2 segments
        location ~ ^/api/userdata/([^/]+)/([^/]+)$ {
            proxy_pass http://comfyui/api/userdata/$1%2F$2$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # -- Default catch-all --
        location / {
            proxy_pass http://comfyui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }
}
